<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <a th:href="@{/home}" class="btn">⬅ Back to Home</a>
    <h1>User Profile</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <form th:action="@{/profile/update}" th:object="${user}" method="post">
        <div style="margin-bottom: 1rem;">
            <label>User Code:</label><br>
            <label>
            <input type="text" th:field="*{code}" readonly class="btn">
            </label>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Name:</label><br>
            <label>
            <input type="text" th:field="*{name}">
            </label>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Surname:</label><br>
            <label>
            <input type="text" th:field="*{surname}">
            </label>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Fine Until:</label><br>
            <label>
            <input type="text" th:value="${user.fined}" readonly>
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/home}" class="btn" style="background: var(--secondary-color); color: white;">Back</a>
    </form>
</div>
</body>
</html>
